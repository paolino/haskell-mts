site_name: MTS Documentation
site_url: https://paolino.github.io/haskell-mts/
repo_url: https://github.com/lambdasistemi/haskell-mts

theme:
  name: material
  palette:
    scheme: slate
  features:
    - navigation.indexes
    - toc.integrate
    - content.code.copy
    - navigation.path

plugins:
  - search
  - asciinema-player

markdown_extensions:
  - admonition
  - tables
  - footnotes
  - def_list
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Concepts: concepts.md
  - MTS Interface: interface.md
  - Implementations:
    - CSMT (Binary Trie): csmt.md
    - MPF (16-ary Trie): mpf.md
  - Architecture:
    - System: architecture/system.md
    - Storage: architecture/storage.md
    - Inclusion Proof: architecture/inclusion-proof.md
    - Example: architecture/example.md
  - Usage:
    - CLI Manual: manual.md
    - Library API: library.md
    - TypeScript Verifier: typescript.md

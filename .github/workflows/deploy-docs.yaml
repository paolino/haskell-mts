name: Build and deploy documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - name: Setup Cachix
        run: cachix authtoken '${{ secrets.CACHIX_AUTH_TOKEN }}' && cachix use paolino
      - run: nix --quiet develop github:paolino/dev-assets?dir=mkdocs -c mkdocs gh-deploy --force

name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - run: sudo rm -rf /opt&
      - uses: actions/checkout@v4
      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build executable
        run: nix --quiet build .#mts
      - name: Build docker image
        run: nix --quiet build .#docker-image -o mts-image
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mts-image
          path: mts-image
      - name: Build appImage artifact
        run: nix --quiet bundle --bundler github:ralismark/nix-appimage .#mts -o mts.AppImage
      - name: Upload appImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: mts-appImage
          path: mts.AppImage
      - name: Build rpm artifact
        run: nix --quiet bundle --bundler github:NixOS/bundlers#toRPM -o mts.rpm
      - name: Upload rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: mts-rpm
          path: mts.rpm
      - name: Build deb artifact
        run: nix --quiet bundle --bundler github:NixOS/bundlers#toDEB -o mts.deb
      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: mts-deb
          path: mts.deb
  unit:
    name: Run unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Run Tests
        run: nix --quiet run .#unit-tests
  bench:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Run Benchmarks
        run: nix --quiet run .#bench
  typescript:
    name: TypeScript Verifier Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Run TypeScript Tests
        run: nix --quiet run ./verifiers/typescript#test
  formatting:
    name: Check code formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Check Formatting
        run: nix --quiet develop -c just format-check
  hlint:
    name: HLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: paolino/dev-assets/setup-nix@v0.0.1
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Run HLint
        run: nix --quiet develop -c just hlint
